server.port=8082
spring.application.name=gateway-api

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webflux.routes[0].id=vehicle-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://VEHICLE-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/vehicles,/api/vehicles/**

spring.cloud.gateway.server.webflux.routes[1].id=client-route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://CLIENT-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/clients,/api/clients/**


logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.cloud.loadbalancer=TRACE
logging.level.reactor.netty=DEBUG
